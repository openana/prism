{{ define "content" }}
{{ range .Categories }}
<article>
    <header><img class="header-icon" src="/static/img/apps-24.svg" alt="">{{ .Category | catAlias | $.Locale.T }}
    </header>
    <div class="overflow-auto">
        <table class="striped" id="downloads-table">
            <thead>
                <tr>
                    <th>{{ $.Locale.T "downloads.th_distro" }}</th>
                </tr>
            </thead>
            <tbody>
                {{ range .Distros }}
                <tr>
                    <td>
                        <img class="browser-icon" src="/static/img/tag-16.svg" alt="">
                        <a href="/downloads/{{ . }}">{{ . }}</a>
                    </td>
                </tr>
                {{ end }}
            </tbody>
        </table>
    </div>
</article>
{{ end }}
{{ end }}
